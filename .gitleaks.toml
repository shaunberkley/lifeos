# Gitleaks configuration for LifeOS
# Used by both CI (secret-scan.yml) and local pre-commit

title = "LifeOS Secret Scanning"

[extend]
useDefault = true

[allowlist]
  description = "project-specific false positives and allowed example files"
  paths = [
    '''\.env\.example$''',
    '''pnpm-lock\.yaml$''',
    '''\.husky/''',
    '''\.gitleaks\.toml$''',
  ]

# Additional custom rules beyond gitleaks defaults

[[rules]]
  id = "convex-deploy-key"
  description = "Convex deployment key"
  path = '''(^|/)\.env(\.[A-Za-z0-9_-]+)?$'''
  regex = '''CONVEX_DEPLOY_KEY\s*[:=]\s*["']?(?:[a-z]+:[A-Za-z0-9_-]+\|[A-Za-z0-9+/=]{16,})["']?'''
  tags = ["convex", "key"]

[[rules]]
  id = "better-auth-secret"
  description = "Better Auth secret"
  path = '''(^|/)\.env(\.[A-Za-z0-9_-]+)?$'''
  regex = '''BETTER_AUTH_SECRET\s*[:=]\s*["']?[a-f0-9]{64}["']?'''
  tags = ["auth", "secret"]

[[rules]]
  id = "ollama-api-key"
  description = "Ollama API key (if using cloud)"
  path = '''(^|/)\.env(\.[A-Za-z0-9_-]+)?$'''
  regex = '''OLLAMA_API_KEY\s*[:=]\s*["']?[A-Za-z0-9+/=._-]{16,}["']?'''
  tags = ["ollama", "key"]

[[rules]]
  id = "hardcoded-bearer-token"
  description = "Hardcoded Bearer token in source"
  regex = '''Bearer\s+[A-Za-z0-9\-._~+/]{20,}'''
  path = '''\.ts$'''
  tags = ["token"]

[[rules]]
  id = "local-bridge-shared-secret"
  description = "Local bridge shared secret"
  path = '''(^|/)\.env(\.[A-Za-z0-9_-]+)?$'''
  regex = '''LOCAL_BRIDGE_SHARED_SECRET\s*[:=]\s*["']?[a-f0-9]{64}["']?'''
  tags = ["bridge", "secret"]
