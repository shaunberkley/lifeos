name: Supply Chain

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  filesystem-sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Generate filesystem SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          path: .
          format: spdx-json
          output-file: lifeos.sbom.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: lifeos-sbom
          path: lifeos.sbom.spdx.json

  container-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Enforce explicit container policy
        run: |
          if [ -f Dockerfile ] || [ -f docker/Dockerfile ]; then
            echo "Container image surface detected."
            echo "Add a real build-and-scan workflow before merging containerized services."
            exit 1
          fi

          echo "No container image surface exists yet. Container policy is explicit and fail-closed for future Dockerfiles."
