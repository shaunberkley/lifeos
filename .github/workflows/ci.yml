name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: pnpm/action-setup@02f6c237bd2518259fed6c71566509edfb3f2b74
        with:
          version: 10.6.5

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format and lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Convex type check
        if: hashFiles('convex/schema.ts') != ''
        run: pnpm exec convex typecheck

      - name: Run tests
        run: pnpm test
