name: Bug report
description: Report a reproducible defect in the current LifeOS baseline.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the defect and why it is wrong.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: List exact steps, inputs, and environment details.
      placeholder: |
        1. Run ...
        2. Open ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation or logs
      description: Include failing checks, stack traces, or screenshots.
